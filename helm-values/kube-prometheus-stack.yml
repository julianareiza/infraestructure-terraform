prometheus:
  prometheusSpec:
    enableRemoteWriteReceiver: true
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

grafana:
  adminPassword: "devsecops-ge-2024"
  persistence:
    enabled: true
    size: 5Gi
    accessModes:
      - ReadWriteOnce
  initChownData:
    enabled: false
  podSecurityContext:
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472
  containerSecurityContext:
    runAsUser: 472
    runAsGroup: 472
    runAsNonRoot: true

  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki.observability.svc.cluster.local:3100
      jsonData:
        derivedFields:
          - datasourceUid: tempo
            matcherRegex: '"trace_id":"(\w+)"'
            name: TraceID
            url: "$${__value.raw}"
    - name: Tempo
      type: tempo
      access: proxy
      uid: tempo
      url: http://tempo.observability.svc.cluster.local:3100
      jsonData:
        tracesToLogsV2:
          datasourceUid: loki
          filterByTraceID: true
        serviceMap:
          datasourceUid: prometheus
        nodeGraph:
          enabled: true

  sidecar:
    alerts:
      enabled: true
      label: grafana_alert
      labelValue: "1"

alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: "default"
      routes:
        - match:
            severity: critical
          receiver: "critical"
    receivers:
      - name: "default"
        webhook_configs: []
      - name: "critical"
        webhook_configs: []

additionalPrometheusRulesMap:
  app-ge-alerts:
    groups:
      - name: app-ge-http-alerts
        rules:
          - alert: HTTP401Unauthorized
            expr: rate(http_requests_total{http_status_code="401"}[5m]) > 0
            for: 1m
            labels:
              severity: warning
              app: app-ge
            annotations:
              summary: "HTTP 401 Unauthorized detected"
              description: "Unauthorized requests detected on app-ge. Rate: {{ $value }} req/s"

          - alert: HTTP404NotFound
            expr: rate(http_requests_total{http_status_code="404"}[5m]) > 5
            for: 2m
            labels:
              severity: warning
              app: app-ge
            annotations:
              summary: "High rate of HTTP 404 Not Found"
              description: "Elevated 404 error rate on app-ge. Rate: {{ $value }} req/s"
